<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>{{ page.title }}</title>
  <link rel="stylesheet" href="/assets/style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
  window.MathJax = {
    tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
    options: { skipHtmlTags: ['script','noscript','style','textarea','pre','code'] }
  };
</script>
<script id="MathJax-script" async
  src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
</script>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

</head>
<body>

<div class="layout">
  <nav class="sidebar" aria-label="Main navigation">
    <div class="side-nav">
      <a href="/" class="side-link{% if page.url == '/' %} active{% endif %}">Home</a>
      <a href="/research.html" class="side-link{% if page.url == '/research.html' %} active{% endif %}">Research</a>
      <a href="/info.html" class="side-link{% if page.url == '/info.html' %} active{% endif %}">Info</a>
      <a href="/travel.html" class="side-link{% if page.url == '/travel.html' %} active{% endif %}">Travel</a>
    </div>
  </nav>

  <main class="main-content">
    {{ content }}
  </main>
</div>

</body>
</html>
